# Template — copy and edit. Use this layout when you have an ancestry-matched
# Plink reference and want LD computed from genotypes (PolyFun --geno).

gwas_dataset:
  id: MY_STUDY
  auto_paths: true

paths:
  # Raw sumstats (DIAMANTE-style columns)
  gwas_raw: data/gwas/MY_STUDY/your_trait_sumstats.tsv

builds:
  gwas: hg19
  entropy: hg38
  ld: hg19

finemap:
  ld_mode: plink
  # Path WITHOUT .bed; .bed/.bim/.fam must all exist
  ld_plink_prefix: data/reference/1000g_phase3_pop/chrALL
