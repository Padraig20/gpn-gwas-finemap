# Example: same GWAS file as the repo default, but outputs under output/EUR/.
# Copy and edit paths for other ancestries (AFR, EAS, SAS, …).

gwas_dataset:
  id: EUR
  auto_paths: true

paths:
  # Raw sumstats path (relative to repo root). Place each ancestry file here
  # or under data/gwas/{ANCESTRY}/ and point gwas_raw accordingly.
  gwas_raw: data/gwas/EUR_Metal_LDSC-CORR_Neff.v2.txt
  # With auto_paths: true, gwas_harmonised, output_dir, and ld_cache are
  # derived from id. Uncomment any of these to override:
  # gwas_harmonised: data/gwas/EUR/sumstats.hg19.parquet
  # output_dir: output/EUR
  # ld_cache: data/ld_cache/EUR

finemap:
  ld_mode: precomputed_npz
  # UKB white-British EUR LD (same as configs/default.yaml prefix)
  ld_npz_url_prefix: https://broad-alkesgroup-ukbb-ld.s3.amazonaws.com/UKBB_LD/

builds:
  gwas: hg19
  entropy: hg38
  ld: hg19
