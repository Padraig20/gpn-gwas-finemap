# polyfun-gpn configuration for the EAS T2D meta-analysis.
#
# Every CLI flag has a YAML counterpart so the full pipeline can be driven
# from one `-c configs/default-EAS.yaml`. CLI flags, when passed, win.
#
#   --gwas-raw PATH        paths.gwas_raw
#   --output-dir PATH      paths.output_dir
#   --loci PATH            paths.loci
#   --prior {none,entropy} prior.mode
#   --ld-mode MODE         finemap.ld_mode      (precomputed_npz | plink)
#   --ld-npz-prefix URL    finemap.ld_npz_url_prefix
#   --ld-plink PATH        finemap.ld_plink_prefix

paths:
  entropy_dir: data/entropy
  gwas_raw: data/gwas/EAS/EAS_Metal_LDSC-CORR_Neff.v2.txt
  gwas_harmonised: data/gwas/EAS/sumstats.hg19.parquet
  background: data/background/entropy_bg.npz
  reference_dir: data/reference
  ld_cache: data/ld_cache
  polyfun_dir: external/polyfun
  finemap_exe: external/bin/finemap
  output_dir: output/EAS/none
  loci: configs/loci_shared_EUR_EAS.tsv

builds:
  gwas: hg19
  entropy: hg38
  ld: hg19

background:
  n_samples: 10000000
  n_bins: 500
  entropy_min: 0.0
  entropy_max: 3.0
  seed: 42

prior:
  mode: none       # none | entropy
  tau: 1.0
  epsilon: 1.0e-6

finemap:
  method: finemap
  max_num_causal: 5
  memory_gb: 4
  threads: 4
  locus_window_bp: 1500000
  # LD source: plink uses the ancestry-matched 1000G EAS panel built by
  # scripts/compute_ld/prepare_unrelated_reference.sh. The Broad NPZ prefix
  # is UKB white-British (~EUR), which is wrong for EAS -- keep ld_mode:
  # plink here unless you're deliberately running EAS sumstats against EUR LD.
  ld_mode: plink
  ld_npz_url_prefix: https://broad-alkesgroup-ukbb-ld.s3.amazonaws.com/UKBB_LD/
  ld_plink_prefix: data/ld_panels/1000G.EAS.unrelated
  max_concurrent_jobs: 4
