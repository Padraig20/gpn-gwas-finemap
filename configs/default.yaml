# polyfun-gpn default configuration. Values not present here fall back to the
# Pydantic model defaults in src/polyfun_gpn/config.py.

paths:
  entropy_dir: data/entropy
  gwas_raw: data/gwas/EUR_Metal_LDSC-CORR_Neff.v2.txt
  gwas_harmonised: data/gwas/sumstats.hg19.parquet
  background: data/background/entropy_bg.npz
  reference_dir: data/reference
  ld_cache: data/ld_cache
  polyfun_dir: external/polyfun
  finemap_exe: external/bin/finemap
  output_dir: output

builds:
  gwas: hg19
  entropy: hg38
  ld: hg19

background:
  n_samples: 10000000
  n_bins: 500
  entropy_min: 0.0
  entropy_max: 3.0
  seed: 42

prior:
  tau: 1.0
  epsilon: 1.0e-6

finemap:
  method: finemap
  max_num_causal: 5
  memory_gb: 4
  threads: 4
  locus_window_bp: 1500000
  ukb_ld_url_prefix: https://broad-alkesgroup-ukbb-ld.s3.amazonaws.com/UKBB_LD/
  pvalue_cutoff: 5.0e-8
  max_concurrent_jobs: 4
