# polyfun-gpn default configuration. Values not present here fall back to the
# Pydantic model defaults in src/polyfun_gpn/config.py.
#
# Multi-ancestry / multi-GWAS: either pass --gwas-id SLUG on the CLI (writes to
# output/{SLUG}/ and data/gwas/{SLUG}/sumstats.hg19.parquet) or copy this file
# to configs/datasets/my_study.yaml and set paths.gwas_raw, paths.gwas_harmonised,
# paths.output_dir explicitly.

gwas_dataset:
  id: default

paths:
  entropy_dir: data/entropy
  gwas_raw: data/gwas/EUR_Metal_LDSC-CORR_Neff.v2.txt
  gwas_harmonised: data/gwas/sumstats.hg19.parquet
  background: data/background/entropy_bg.npz
  reference_dir: data/reference
  # FINEMAP caches LD matrices here; overridden to data/ld_cache/{slug} with --gwas-id
  ld_cache: data/ld_cache
  polyfun_dir: external/polyfun
  finemap_exe: external/bin/finemap
  output_dir: output

builds:
  gwas: hg19
  entropy: hg38
  ld: hg19

background:
  n_samples: 10000000
  n_bins: 500
  entropy_min: 0.0
  entropy_max: 3.0
  seed: 42

prior:
  tau: 1.0
  epsilon: 1.0e-6

finemap:
  method: finemap
  max_num_causal: 5
  memory_gb: 4
  threads: 4
  locus_window_bp: 1500000
  # LD: precomputed_npz (Broad-style per-region NPZ URLs) vs plink (ancestry-matched --geno)
  ld_mode: precomputed_npz
  ld_npz_url_prefix: https://broad-alkesgroup-ukbb-ld.s3.amazonaws.com/UKBB_LD/
  # When ld_mode == plink, set stem without .bed (PolyFun FINEMAP --geno)
  ld_plink_prefix: null
  # Genome-wide tiling; default is PolyFun ukb_regions.tsv.gz when unset
  ld_regions_file: null
  # Legacy YAML alias for ld_npz_url_prefix: ukb_ld_url_prefix
  pvalue_cutoff: 5.0e-8
  max_concurrent_jobs: 4
